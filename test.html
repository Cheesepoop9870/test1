<!DOCTYPE html>
<html>
<head>
  <title>Page Title</title>

  <style>
    body,textarea,button {
      font-family: "arial";
    }
    
    .input {
      height: 200px;
      width: 400px;
    }

    .input::placeholder {
      vertical-align: top;
    }

    h1 {
      text-align: center;
      background-color: #34ebe5;
      padding: 12px 20px;
      margin: -8px;
      border: 2px solid;
      
    }

    body {
      background: #42f581;
    }

    .error {
      color: red;
      background-color:#ff7c6e;
      padding: 12px 20px;
      
    }
  </style>

</head>


<body>

  <h1>This is a Heading</h1>
  <p>This is a paragraph.</p>
  <label for="name">What quote needs formatting?</label>
  <p></p>
  <textarea type="text" name="name" class="input" id="userInput" placeholder="Enter quote here..." autocomplete="off"></textarea>
  <p></p>
  <label for="pgNum">
  Page number (optinal)
  </label>
  
  <input type="number" name="pgNum" id="pgNum"placeholder="Enter page number" min="1">
  

  <button id="submitBtn">Submit</button>

  <p id="output"></p>

  <script>
    // JavaScript Logic
    document.getElementById("submitBtn").addEventListener("click", () => {
      // 1. Get input value
      
      let quote = document.getElementById("userInput").value; 
      // 2. Display output text on the page
      const pgNum = document.getElementById("pgNum").value;
      const output = document.getElementById("output");
      output.classList.remove("error");
      quote = quote.replaceAll(/\n|\r/gmi, ' ').replaceAll(/\"/gmi,"'");
      if (pgNum && quote && (pgNum > 0)) {
        output.textContent = `"${quote}" (${pgNum})`;
      } else if (quote && !pgNum) {
        output.textContent = `"${quote}"`;
      } else if (!quote) {
        output.textContent = "Quote cannot be empty";
        output.classList.add("error");
      } else if (pgNum <= 0){
        output.textContent = "Page Number must be above 0";
        output.classList.add("error");
      }
       
    });
  </script>



</body>
</html>
